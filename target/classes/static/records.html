<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>月度记账清单</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header row">
        <h1>月度记账清单页</h1>
        <a href="/">返回首页</a>
      </header>

      <section class="card">
        <form id="finance-form" class="form-grid form-2cols">
          <label>
            月份
            <input type="month" id="finance-month" required />
          </label>

          <label>
            类型
            <select id="finance-type" required>
              <option value="income">收入</option>
              <option value="expense">支出</option>
            </select>
          </label>

          <label>
            金额
            <input type="number" id="finance-amount" step="0.01" min="0" placeholder="0.00" required />
          </label>

          <label>
            说明
            <input type="text" id="finance-note" placeholder="例如：工资 / 餐饮" required />
          </label>

          <button type="submit">添加记录</button>
        </form>

        <div id="monthly-summary" class="summary" aria-live="polite"></div>
        <ul id="finance-list" class="list"></ul>

        <div class="pager row" id="records-pager">
          <button type="button" id="records-prev">上一页</button>
          <div id="records-page-info" class="pager-info" aria-live="polite"></div>
          <button type="button" id="records-next">下一页</button>
        </div>
      </section>
    </main>

    <script src="api.js"></script>
    <script src="records.js"></script>
  </body>
</html>
