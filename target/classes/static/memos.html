<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>备忘录清单</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header row">
        <h1>备忘录清单页</h1>
        <div class="nav-right">
          <a href="/">Home</a>
          <div id="nav-bar" class="nav-bar"></div>
        </div>
      </header>

      <section class="card">
        <form id="memo-form" class="form-grid">
          <label>
            新备忘
            <textarea id="memo-content" rows="3" placeholder="例如：周五提交报表" required></textarea>
          </label>
          <button type="submit">添加备忘</button>
        </form>

        <ul id="memo-list" class="list"></ul>

        <div class="pager row" id="memo-pager">
          <button type="button" id="memo-prev">上一页</button>
          <div id="memo-page-info" class="pager-info" aria-live="polite"></div>
          <button type="button" id="memo-next">下一页</button>
        </div>
      </section>
    </main>

    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="nav.js"></script>
    <script src="memos.js"></script>
  </body>
</html>
