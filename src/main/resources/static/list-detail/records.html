<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Records</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header row"><h1 data-i18n="records_title">Records</h1><div class="nav-right"><a href="./index.html" data-i18n="nav_home">Home</a><div id="nav-bar" class="nav-bar"></div></div></header>
      <section class="card">
        <form id="finance-form" class="form-grid form-2cols">
          <label><span data-i18n="records_month">Month</span><input type="month" id="finance-month" required /></label>
          <label><span data-i18n="records_type">Type</span><select id="finance-type" required><option value="income" data-i18n="records_income">Income</option><option value="expense" data-i18n="records_expense">Expense</option></select></label>
          <label><span data-i18n="records_amount">Amount</span><input type="number" id="finance-amount" step="0.01" min="0" required /></label>
          <label><span data-i18n="records_note">Note</span><input type="text" id="finance-note" data-i18n-placeholder="records_note" required /></label>
          <button type="submit" data-i18n="records_add">Add record</button>
        </form>
        <div id="monthly-summary" class="summary"></div>
        <ul id="finance-list" class="list"></ul>
        <div class="pager row" id="records-pager">
          <button type="button" id="records-prev" data-i18n="nav_prev">Prev</button>
          <div id="records-page-info" class="pager-info" aria-live="polite"></div>
          <button type="button" id="records-next" data-i18n="nav_next">Next</button>
        </div>
      </section>
    </main>
    <script src="../i18n.js"></script>
    <script src="../api.js"></script>
    <script src="../auth.js"></script>
    <script src="../nav.js"></script>
    <script src="./records.js"></script>
  </body>
</html>
