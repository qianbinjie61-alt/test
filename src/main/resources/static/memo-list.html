<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>备忘录清单</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header row">
        <h1>备忘录清单</h1>
        <a href="/">返回首页</a>
      </header>

      <section class="card">
        <form id="memo-form" class="form-grid">
          <label>
            新备忘
            <textarea id="memo-content" rows="3" placeholder="例如：周五提交报表" required></textarea>
          </label>
          <button type="submit">添加备忘</button>
        </form>
        <ul id="memo-list" class="list"></ul>
      </section>
    </main>

    <script src="api.js"></script>
    <script src="memo-list.js"></script>
  </body>
</html>
